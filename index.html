<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FP2級 特訓アプリ TEPPEN</title>
    <style>
        :root {
            --bg-color: #fff5f7;
            --text-brown: #6b5344;
            --main-color: #ffe4e8;
            --accent-color: #ff8e99;
            --star-yellow: #ffce33;
            --hachiware-blue: #e8f4fc;
            --card-bg: #ffffff;
        }
        * { box-sizing: border-box; }
        body { 
            font-family: 'Hiragino Maru Gothic ProN', 'Rounded M+ 1c', 'Zen Maru Gothic', 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; 
            background-color: var(--bg-color); 
            background-image: radial-gradient(#fbdce0 2px, transparent 2px);
            background-size: 18px 18px;
            color: var(--text-brown); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            height: 100dvh; 
            overflow: hidden; 
        }
        .container { 
            width: 100%; 
            max-width: 440px; 
            padding: 10px; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            height: 100%;
        }
        
        /* ------------------------
           ホーム画面 (TEPPEN)
        ------------------------ */
        #home-screen {
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* 上寄せにしてスクロール可能に */
            align-items: center;
            text-align: center;
            padding: 20px 10px;
            overflow-y: auto; /* ボタンが増えてもはみ出さないように */
            width: 100%;
        }
        .home-content {
            width: 100%;
            padding-bottom: 20px;
        }
        .app-title {
            font-size: 3.2rem;
            font-weight: 900;
            color: var(--accent-color);
            margin: 10px 0 5px 0;
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(255, 133, 162, 0.3);
            letter-spacing: 2px;
        }
        .app-subtitle {
            font-size: 1.05rem;
            font-weight: bold;
            color: #887a73;
            margin: 0 auto 20px auto;
            background: #fff;
            padding: 5px 15px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: inline-block;
        }
        
        /* ▼ ボタンのレイアウトを1列に変更 ▼ */
        .field-grid {
            display: grid;
            grid-template-columns: 1fr; /* 1列に設定 */
            gap: 12px;
            width: 100%;
            padding: 0 5px;
        }
        .field-btn {
            padding: 12px 15px;
            border-radius: 16px;
            border: none;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.15);
            transition: transform 0.1s, box-shadow 0.1s;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
        }
        .field-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 rgba(0,0,0,0.15);
        }
        .field-info {
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
            flex: 1;
        }
        .icon { font-size: 1.8rem; margin-bottom: 0;}
        .field-title {
            font-size: 1.05rem;
            font-weight: bold;
            line-height: 1.3;
        }
        
        /* ▼ ホーム画面の進捗バー用CSS ▼ */
        .field-prog-wrap {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            min-width: 90px;
            margin-left: 10px;
            flex-shrink: 0;
        }
        .home-progress-container {
            width: 100%;
            height: 8px;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 4px;
            margin-top: 5px;
            overflow: hidden;
        }
        .home-progress-bar {
            height: 100%;
            width: 0%;
            background-color: #ffffff;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .home-progress-text {
            font-size: 0.8rem;
            font-weight: bold;
            opacity: 0.95;
            text-align: right;
            line-height: 1.3;
        }
        
        /* テーマカラー（ちいかわキャラクター風のパステルグラデーション） */
        .btn-A { background: linear-gradient(135deg, #ffd1d8 0%, #ffedf0 100%); color: #6b5344;}
        .btn-B { background: linear-gradient(135deg, #cde3fb 0%, #edf6ff 100%); color: #6b5344;}
        .btn-C { background: linear-gradient(135deg, #ffe28a 0%, #fff6d9 100%); color: #6b5344;}
        .btn-D { background: linear-gradient(135deg, #d3f0e0 0%, #effaf4 100%); color: #6b5344;}
        .btn-E { background: linear-gradient(135deg, #e3d4f8 0%, #f4edff 100%); color: #6b5344;}
        .btn-F { background: linear-gradient(135deg, #ffdac2 0%, #ffefe3 100%); color: #6b5344;}

        /* ------------------------
           学習画面
        ------------------------ */
        .progress-container { width: 100%; height: 6px; background-color: #eee; border-radius: 3px; margin-bottom: 8px; flex-shrink: 0;}
        #progress-bar { height: 100%; width: 0%; background-color: var(--accent-color); border-radius: 3px; transition: width 0.3s; }
        
        .card { 
            background: var(--card-bg); 
            border: 3px solid var(--main-color); 
            border-radius: 20px; 
            padding: 15px 12px; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.05); 
            text-align: center; 
            position: relative; 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        .field-badge {
            position: absolute; top: 8px; left: 10px; font-size: 0.75rem; font-weight: bold; background: #eee; padding: 3px 8px; border-radius: 10px; color: #555;
        }
        .star-btn { position: absolute; top: 5px; right: 10px; font-size: 1.5rem; cursor: pointer; border: none; background: none; color: #ddd; z-index: 10; padding:0;}
        .star-btn.active { color: var(--star-yellow); }
        
        .mode-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.75rem; margin-top: 5px; margin-bottom: 5px; font-weight: bold; align-self: center;}
        .mode-normal { background: var(--main-color); color: var(--text-brown); }
        .mode-test { background: #e3d4f8; color: #6b5344; }
        .mode-review { background: #fff0b3; color: #6b5344; }
        .mode-fav { background: #ffd1d8; color: #6b5344; }
        
        .q-header { font-size: 0.85rem; font-weight: bold; color: var(--accent-color); margin-bottom: 5px; }
        
        .q-text { 
            font-size: 1.05rem; line-height: 1.5; margin-bottom: 10px; 
            max-height: 35%; overflow-y: auto; text-align: left; padding: 0 5px; flex-shrink: 0;
        }
        
        .btn-group { display: flex; gap: 10px; margin-top: auto; margin-bottom: 5px; flex-shrink: 0; }
        .btn-main { flex: 1; padding: 15px; font-size: 1.8rem; border: none; border-radius: 15px; cursor: pointer; transition: 0.1s; box-shadow: 0 4px 0 rgba(0,0,0,0.1); font-weight:bold;}
        .btn-main:active { transform: translateY(4px); box-shadow: none; }
        .btn-o { background-color: #ffb7c5; color: white; }
        .btn-x { background-color: #a0d8ef; color: white; }

        #answer-section { 
            display: none; padding: 10px; background-color: var(--hachiware-blue); 
            border-radius: 15px; flex-direction: column; flex-grow: 1; overflow-y: hidden; 
            animation: fadeIn 0.2s ease; margin-top: auto;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px);} to { opacity: 1; transform: translateY(0);} }
        
        .result-msg { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; flex-shrink: 0;}
        .explanation { 
            font-size: 0.95rem; text-align: left; line-height: 1.5; margin-bottom: 8px; 
            overflow-y: auto; color: #333; border-top: 1px dashed rgba(0,0,0,0.1); padding-top: 8px; flex-grow: 1;
        }
        
        .memo-area { margin-bottom: 8px; text-align: left; flex-shrink: 0; }
        .memo-label { font-size: 0.75rem; font-weight: bold; color: var(--accent-color); display: block; margin-bottom: 2px; }
        .memo-input { width: 100%; border: 1px solid #ccc; border-radius: 8px; padding: 8px; font-size: 0.9rem; font-family: inherit; background: #fff; box-sizing: border-box; resize: none; }
        
        .btn-next { width: 100%; background-color: var(--accent-color); color: white; font-size: 1.1rem; border-radius: 12px; border:none; padding: 12px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 0 #d66d85; flex-shrink: 0; }
        .btn-next:active { transform: translateY(4px); box-shadow: none; }
        
        .btn-copy { width: auto; background-color: transparent; color: #888; border: 1px solid #ccc; font-size: 0.7rem; padding: 5px 10px; border-radius: 8px; cursor: pointer; display: block; margin: 10px auto 0 auto; flex-shrink: 0; }
        
        .footer-btns { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; z-index: 10; flex-shrink: 0; }
        .btn-sub { padding: 12px; font-size: 0.9rem; background: #eee; border-radius: 12px; color: #666; border:none; cursor: pointer; font-weight: bold; box-shadow: 0 3px 0 #ccc;}
        .btn-sub:active { transform: translateY(3px); box-shadow: none; }
        
        /* モーダル・トースト */
        .modal-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; justify-content:center; align-items:center; z-index:200; }
        .modal-content { background: white; width: 85%; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-title { font-weight:bold; color:var(--text-brown); margin-bottom:15px; font-size:1.1rem; }
        .modal-btn { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-size: 0.95rem; }
        
        .result-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--card-bg); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 150; padding: 20px; box-sizing: border-box; border-radius:18px;}
        #copy-toast { display: none; position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 20px; font-size: 0.85rem; z-index: 1000; font-weight:bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2);}
    </style>
</head>
<body>

<!-- ▼▼ ホーム画面 ▼▼ -->
<div id="home-screen" class="container">
    <div class="home-content">
        <h1 class="app-title">TEPPEN</h1>
        <p class="app-subtitle">ちょっとでも毎日やる！</p>
        
        <div class="field-grid">
            <button class="field-btn btn-A" onclick="selectField('A分野')">
                <div class="field-info">
                    <span class="icon">💼</span>
                    <span class="field-title">A ライフプランニング<br>と資金計画</span>
                </div>
                <div class="field-prog-wrap">
                    <div class="home-progress-text" id="home-text-A分野">0% (0/0)</div>
                    <div class="home-progress-container"><div class="home-progress-bar" id="home-prog-A分野"></div></div>
                </div>
            </button>
            <button class="field-btn btn-B" onclick="selectField('B分野')">
                <div class="field-info">
                    <span class="icon">🛡️</span>
                    <span class="field-title">B リスク管理</span>
                </div>
                <div class="field-prog-wrap">
                    <div class="home-progress-text" id="home-text-B分野">0% (0/0)</div>
                    <div class="home-progress-container"><div class="home-progress-bar" id="home-prog-B分野"></div></div>
                </div>
            </button>
            <button class="field-btn btn-C" onclick="selectField('C分野')">
                <div class="field-info">
                    <span class="icon">📈</span>
                    <span class="field-title">C 金融資産運用</span>
                </div>
                <div class="field-prog-wrap">
                    <div class="home-progress-text" id="home-text-C分野">0% (0/0)</div>
                    <div class="home-progress-container"><div class="home-progress-bar" id="home-prog-C分野"></div></div>
                </div>
            </button>
            <button class="field-btn btn-D" onclick="selectField('D分野')">
                <div class="field-info">
                    <span class="icon">💰</span>
                    <span class="field-title">D タックスプランニング</span>
                </div>
                <div class="field-prog-wrap">
                    <div class="home-progress-text" id="home-text-D分野">0% (0/0)</div>
                    <div class="home-progress-container"><div class="home-progress-bar" id="home-prog-D分野"></div></div>
                </div>
            </button>
            <button class="field-btn btn-E" onclick="selectField('E分野')">
                <div class="field-info">
                    <span class="icon">🏠</span>
                    <span class="field-title">E 不動産</span>
                </div>
                <div class="field-prog-wrap">
                    <div class="home-progress-text" id="home-text-E分野">0% (0/0)</div>
                    <div class="home-progress-container"><div class="home-progress-bar" id="home-prog-E分野"></div></div>
                </div>
            </button>
            <button class="field-btn btn-F" onclick="selectField('F分野')">
                <div class="field-info">
                    <span class="icon">👨‍👩‍👧</span>
                    <span class="field-title">F 相続・事業承継</span>
                </div>
                <div class="field-prog-wrap">
                    <div class="home-progress-text" id="home-text-F分野">0% (0/0)</div>
                    <div class="home-progress-container"><div class="home-progress-bar" id="home-prog-F分野"></div></div>
                </div>
            </button>
        </div>
    </div>
</div>

<!-- ▼▼ 学習画面 ▼▼ -->
<div id="app-screen" class="container" style="display:none;">
    <div class="progress-container"><div id="progress-bar"></div></div>
    <div class="card" id="main-card">
        <div id="field-display" class="field-badge">A分野</div>
        <button id="star-btn" class="star-btn" onclick="toggleFav()">★</button>
        
        <div id="mode-display" class="mode-badge mode-normal">通常モード</div>
        <div id="q-header-text" class="q-header">読み込み中...</div>
        <div class="q-text" id="q-content">データを読み込んでいます...</div>

        <div class="btn-group" id="btn-group">
            <button class="btn-main btn-o" onclick="check('⚪︎')">⚪︎</button>
            <button class="btn-main btn-x" onclick="check('×')">×</button>
        </div>

        <div id="answer-section">
            <div id="result-msg" class="result-msg"></div>
            <div id="explanation" class="explanation"></div>
            <div class="memo-area">
                <label class="memo-label">✎ マイメモ</label>
                <textarea class="memo-input" id="memo-input" rows="2" placeholder="覚え方などをメモ..." oninput="saveMemo()"></textarea>
            </div>
            <button class="btn-next" onclick="next()">次の問題へ ▶</button>
            <button class="btn-copy" onclick="copyForGemini()">Geminiに聞くテキストをコピー 📋</button>
        </div>

        <!-- テスト結果画面 -->
        <div id="test-result-screen" class="result-overlay">
            <h2 style="color:var(--accent-color); margin-bottom: 10px;">テスト終了！</h2>
            <p id="test-score-text" style="font-size: 1.3rem; margin-bottom: 25px; font-weight: bold;"></p>
            <button class="btn-next" style="width: 80%;" onclick="finishTest()">通常モードに戻る</button>
        </div>

        <!-- ★ 周回クリアお祝い画面 ★ -->
        <div id="lap-clear-screen" class="result-overlay">
            <h2 id="lap-clear-title" style="color:var(--accent-color); margin-bottom: 15px; font-size: 1.8rem; text-shadow: 1px 1px 0px #fff;">🎉 クリア！ 🎉</h2>
            <p id="lap-clear-text" style="font-size: 1.05rem; margin-bottom: 25px; font-weight: bold; line-height: 1.5;"></p>
            <button class="btn-next" style="width: 80%; background:#fce38a; color:#d48a00; box-shadow: 0 4px 0 #e5c45b;" onclick="closeLapClear()">次の周へ進む！</button>
        </div>
    </div>
    
    <div class="footer-btns">
        <button class="btn-sub" onclick="openMenu()" style="background: #e1bee7; color: #4a148c; box-shadow: 0 3px 0 #ba68c8;">☰ メニュー</button>
        <button class="btn-sub" onclick="goHome()">🏠 ホームへ</button>
    </div>
</div>

<!-- ▼▼ メニューモーダル ▼▼ -->
<div class="modal-overlay" id="menu-modal" onclick="closeMenu()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-title" id="menu-title">学習メニュー</div>
        <button class="modal-btn" style="background:#ce93d8; color:white;" onclick="startTest(); closeMenu();">10問テスト</button>
        <button class="modal-btn" style="background:#fff176; color:#856404;" onclick="startReview(); closeMenu();">復習モード (<span id="rev-count-m">0</span>)</button>
        <button class="modal-btn" style="background:#ffe082; color:#795548;" onclick="startFav(); closeMenu();">お気に入り (<span id="fav-count-m">0</span>)</button>
        <div style="margin:15px 0; border-top:1px dashed #ccc;"></div>
        <button class="modal-btn" id="reset-btn" style="background:#ffcdd2; color:#b71c1c;" onclick="resetApp()">この分野のデータをリセット</button>
        <button class="modal-btn" style="background:#eee; color:#333; margin-top:5px;" onclick="closeMenu()">閉じる</button>
    </div>
</div>
<div id="copy-toast">コピーしました！</div>

<script>
// ==========================================
// 1. 問題データ（プレビュー用に各分野2問ずつ抜粋）
// ==========================================
const rawData = [
    {
    "field": "A分野",
    "items": [
      {
        "no": 1,
        "question": "税理士の登録を受けていないFPが、ふるさと納税について相談に来た顧客の求めに応じ、顧客の年間収入や家族構成をもとに寄附金控除の額を計算し、確定申告書の作成を代行した。",
        "answer": "×",
        "explanation": "確定申告書などの税務書類の作成は、税理士の登録を受けていないFPが行うことはできません。"
      },
      {
        "no": 2,
        "question": "税理士の登録を受けていないFPが、顧客から配偶者控除と配偶者特別控除の適用要件を聞かれ、所得税法の条文等を示しつつ、それぞれの適用要件の違いを説明した。",
        "answer": "⚪︎",
        "explanation": "配偶者控除などの税制に関する一般的な説明を行うことは、税理士法に抵触しないため、税理士の登録を受けていないFPでも可能です。"
      },
      {
        "no": 3,
        "question": "弁護士の登録を受けていないFPが、顧客から配偶者居住権について相談を受け、関連法令の条文を示しながら、制度の概要を無償で説明した。",
        "answer": "⚪︎",
        "explanation": "弁護士資格を保有していない者であっても、無償にて一般的な法制度の説明を行うことは可能です。なお、報酬を得る目的で具体的な法律事件についての相談や、個別的なアドバイスを行うことはできません。"
      },
      {
        "no": 4,
        "question": "弁護士の登録を受けていないFPが、相続について相談に来た顧客の求めに応じ、顧客と代理人契約を締結し、顧客の代理人として、有償で他の相続人との遺産分割協議を行った。",
        "answer": "×",
        "explanation": "弁護士資格のないFPが有償で他の相続人との遺産分割協議を代理人として行うことは、弁護士法違反となります。"
      },
      {
        "no": 5,
        "question": "弁護士の登録を受けていないFPが、顧客から公正証書遺言の作成時の証人になることを要請され、証人としての欠格事由に該当しないことを確認したうえで、有償で証人になった。",
        "answer": "⚪︎",
        "explanation": "公正証書遺言の証人となることにおいて、弁護士資格等の特別な資格は不要です。公正証書遺言の証人においては、一定の欠格事由（未成年者や推定相続人など）に該当しなければ、有償で証人となっても問題ありません。\n独占業務に関する問題では、原則として「「一般的な」＝OK」、「『個別具体的な』＝NG」という覚え方で問題ありません。しかし、本問題のように一見すると独占業務のように見えるものもありますので、そういった例外だけ問題演習で押さえていきましょう。"
      },
      {
        "no": 6,
        "question": "司法書士の登録を受けていないFPが、顧客から将来判断能力が不十分になった場合の財産の管理を依頼され、有償で当該顧客の任意後見受任者となった。",
        "answer": "⚪︎",
        "explanation": "任意後見受任者になるために資格は不要であるため、有償無償を問わず、誰でもなることが可能です。"
      },
      {
        "no": 7,
        "question": "司法書士の資格を有しないFPが、住宅ローンを完済した顧客から、抵当権の抹消登記について相談を受け、申請書を作成して登記手続を代行した。",
        "answer": "×",
        "explanation": "登記手続きの代理や書類作成を業として行うことは司法書士の独占業務とされているため、司法書士の資格を有しないFPが申請書を作成し、登記手続きを代行することはできません。"
      },

// ==========================================
// 2. データをアプリ用にセットアップ
// ==========================================
const db = {};
if (rawData && rawData.length > 0) {
    rawData.forEach(category => {
        db[category.field] = category.items;
    });
}

// ==========================================
// 3. アプリのロジック
// ==========================================
let currentField = "";
let questions = [];

let currentIdx = 0;
let currentLap = 1; // 周回数を管理
let mode = 'normal'; 
let reviewList = [];
let favList = [];
let memoData = {};
let testIndices = []; 
let testCurrentIdx = 0; 
let testCorrectCount = 0; 
let resetClickCount = 0;
let currentQuestion = null;

const fieldColors = {
    "A分野": { main: "#ffe0e5", accent: "#ff8e99" }, // ちいかわピンク
    "B分野": { main: "#e0f0ff", accent: "#6baced" }, // ハチワレブルー
    "C分野": { main: "#fff0b3", accent: "#f5b700" }, // うさぎイエロー
    "D分野": { main: "#d6f5e3", accent: "#4ec282" }, // モモンガミント
    "E分野": { main: "#ebdfff", accent: "#9b72e0" }, // ラッコパープル
    "F分野": { main: "#ffe5d4", accent: "#ff9955" }  // シーサーオレンジ
};

// ▼ ホーム画面の進捗バーを更新する関数 ▼
function updateHomeProgress() {
    const fields = ["A分野", "B分野", "C分野", "D分野", "E分野", "F分野"];
    fields.forEach(field => {
        if (db[field] && db[field].length > 0) {
            const savedIdx = parseInt(localStorage.getItem(`fp_progress_${field}`)) || 0;
            const savedLap = parseInt(localStorage.getItem(`fp_lap_${field}`)) || 1;
            const total = db[field].length;
            const percent = Math.floor((savedIdx / total) * 100);
            
            const bar = document.getElementById(`home-prog-${field}`);
            const text = document.getElementById(`home-text-${field}`);
            if (bar && text) {
                bar.style.width = percent + '%';
                // 周回数が2以上の場合は「👑 〇周目」を表示（改行して下に表示）
                const lapText = savedLap > 1 ? `<br>👑${savedLap}周目` : '';
                text.innerHTML = `${percent}% (${savedIdx}/${total}) ${lapText}`;
            }
        }
    });
}

// 起動時にホーム画面の進捗を読み込む
window.onload = () => {
    updateHomeProgress();
};

function goHome() {
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('home-screen').style.display = 'flex';
    updateHomeProgress(); // ホームに戻る時も最新の進捗を反映
}

function selectField(field) {
    if(!db[field] || db[field].length === 0) {
        alert("データが貼り付けられていないか、読み込めません！コード内の rawData にデータを貼り付けてください。"); 
        return;
    }
    currentField = field;
    questions = db[field];
    
    const colors = fieldColors[field] || fieldColors["A分野"];
    document.documentElement.style.setProperty('--main-color', colors.main);
    document.documentElement.style.setProperty('--accent-color', colors.accent);
    
    document.getElementById('menu-title').innerText = `${field} メニュー`;
    
    loadData();
    mode = 'normal';
    
    document.getElementById('home-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    
    update();
}

function getKey(type) { return `fp_${type}_${currentField}`; }

function loadData() {
    reviewList = JSON.parse(localStorage.getItem(getKey('review'))) || [];
    favList = JSON.parse(localStorage.getItem(getKey('fav'))) || [];
    memoData = JSON.parse(localStorage.getItem(getKey('memo'))) || {};
    currentIdx = parseInt(localStorage.getItem(getKey('progress'))) || 0;
    currentLap = parseInt(localStorage.getItem(getKey('lap'))) || 1;
    
    if(currentIdx >= questions.length) {
        currentIdx = 0;
    }
    
    reviewList = reviewList.filter(no => questions.some(q => q.no === no));
    favList = favList.filter(no => questions.some(q => q.no === no));
}

function update() {
    const modeDisp = document.getElementById('mode-display');
    const qHeader = document.getElementById('q-header-text');
    const ansSec = document.getElementById('answer-section');
    const btnGrp = document.getElementById('btn-group');
    const resOverlay = document.getElementById('test-result-screen');
    const lapOverlay = document.getElementById('lap-clear-screen');
    
    ansSec.style.display = 'none'; 
    btnGrp.style.display = 'flex'; 
    resOverlay.style.display = 'none';
    lapOverlay.style.display = 'none';

    // フィールド名＋周回数バッジの更新
    const fieldBadgeText = currentLap > 1 ? `${currentField} (👑${currentLap})` : currentField;
    document.getElementById('field-display').innerText = fieldBadgeText;

    if (mode === 'test') {
        currentQuestion = questions[testIndices[testCurrentIdx]];
        modeDisp.innerText = "10問テスト"; modeDisp.className = "mode-badge mode-test";
        qHeader.innerHTML = (testCurrentIdx + 1) + ' / 10';
    } else if (mode === 'review') {
        if (reviewList.length === 0) { mode = 'normal'; return update(); }
        currentQuestion = questions.find(item => item.no === reviewList[0]);
        modeDisp.innerText = "復習モード"; modeDisp.className = "mode-badge mode-review";
        qHeader.innerHTML = '残り ' + reviewList.length + ' 問';
    } else if (mode === 'fav') {
        if (favList.length === 0) { mode = 'normal'; return update(); }
        currentQuestion = questions.find(item => item.no === favList[0]);
        modeDisp.innerText = "お気に入り"; modeDisp.className = "mode-badge mode-fav";
        qHeader.innerHTML = '残り ' + favList.length + ' 問';
    } else {
        currentQuestion = questions[currentIdx];
        modeDisp.innerText = "通常モード"; modeDisp.className = "mode-badge mode-normal";
        qHeader.innerHTML = 'No. ' + currentQuestion.no + ' / ' + questions[questions.length - 1].no;
    }

    if(!currentQuestion) {
        mode = 'normal'; update(); return;
    }

    const qNo = currentQuestion.no;
    document.getElementById('star-btn').className = favList.includes(qNo) ? "star-btn active" : "star-btn";
    document.getElementById('q-content').innerText = currentQuestion.question;
    document.getElementById('memo-input').value = memoData[qNo] || "";
    document.getElementById('rev-count-m').innerText = reviewList.length;
    document.getElementById('fav-count-m').innerText = favList.length;
    
    const percent = mode === 'normal' ? (currentIdx / questions.length) * 100 : 100;
    document.getElementById('progress-bar').style.width = percent + '%';
}

function check(userAns) {
    document.getElementById('btn-group').style.display = 'none';
    document.getElementById('answer-section').style.display = 'flex';

    const isMaru = (val) => ['○', '⚪︎', '⚪', '〇'].includes(val);
    const isBatsu = (val) => ['×', 'x', 'X', '✕', '✖'].includes(val);
    const isCorrect = (isMaru(userAns) && isMaru(currentQuestion.answer)) || 
                      (isBatsu(userAns) && isBatsu(currentQuestion.answer));

    const resMsg = document.getElementById('result-msg');
    const qNo = currentQuestion.no;

    if (isCorrect) {
        resMsg.innerText = "正解 ✅"; resMsg.style.color = "#ff8e99";
        if (mode === 'test') testCorrectCount++;
        if (mode === 'review') reviewList.shift();
        if (mode === 'fav') favList.push(favList.shift());
    } else {
        resMsg.innerText = "不正解 ❌"; resMsg.style.color = "#6baced";
        if (!reviewList.includes(qNo)) reviewList.push(qNo);
        if (mode === 'review') reviewList.push(reviewList.shift());
        if (mode === 'fav') favList.push(favList.shift());
    }
    
    localStorage.setItem(getKey('review'), JSON.stringify(reviewList));
    localStorage.setItem(getKey('fav'), JSON.stringify(favList));
    document.getElementById('explanation').innerHTML = "<b>正解：" + currentQuestion.answer + "</b><br>" + currentQuestion.explanation;
}

// ▼ お祝い画面の処理 ▼
function showLapClear(lap) {
    const screen = document.getElementById('lap-clear-screen');
    document.getElementById('lap-clear-title').innerText = `🎉 ${lap - 1}周目 クリア！ 🎉`;
    document.getElementById('lap-clear-text').innerHTML = `TEPPENに一歩近づきましたね！<br>この調子で${lap}周目も応援しています！`;
    screen.style.display = 'flex';
}

function closeLapClear() {
    document.getElementById('lap-clear-screen').style.display = 'none';
    update();
}

function next() {
    if (mode === 'test') { 
        testCurrentIdx++; 
        if (testCurrentIdx >= testIndices.length) return showTestResult(); 
    }
    else if (mode === 'normal') { 
        currentIdx++; 
        // 最後まで解き終わった時の処理
        if (currentIdx >= questions.length) {
            currentIdx = 0; 
            currentLap++; // 周回数をアップ
            localStorage.setItem(getKey('lap'), currentLap);
            localStorage.setItem(getKey('progress'), currentIdx); 
            return showLapClear(currentLap); // お祝い画面を出す
        }
        localStorage.setItem(getKey('progress'), currentIdx); 
    }
    update();
}

function startTest() {
    const maxIdx = currentIdx === 0 ? 1 : currentIdx;
    let pool = Array.from({length: maxIdx + 1}, (_, i) => i);
    for (let i = pool.length - 1; i > 0; i--) { const r = Math.floor(Math.random() * (i + 1)); [pool[i], pool[r]] = [pool[r], pool[i]]; }
    testIndices = pool.slice(0, 10); mode = 'test'; testCurrentIdx = 0; testCorrectCount = 0; update();
}

function openMenu() { document.getElementById('menu-modal').style.display = 'flex'; }
function closeMenu() { document.getElementById('menu-modal').style.display = 'none'; }
function finishTest() { mode = 'normal'; update(); }
function startReview() { mode = 'review'; update(); }
function startFav() { mode = 'fav'; update(); }

function toggleFav() {
    const qNo = currentQuestion.no;
    const pos = favList.indexOf(qNo); 
    if (pos > -1) favList.splice(pos, 1); else favList.push(qNo);
    localStorage.setItem(getKey('fav'), JSON.stringify(favList)); 
    document.getElementById('star-btn').className = favList.includes(qNo) ? "star-btn active" : "star-btn";
}

function saveMemo() { 
    const qNo = currentQuestion.no; 
    memoData[qNo] = document.getElementById('memo-input').value; 
    localStorage.setItem(getKey('memo'), JSON.stringify(memoData)); 
}

function copyForGemini() {
    const memo = memoData[currentQuestion.no] || "";
    let text = `以下のFP2級の問題について教えてください。\n\n【問題 No.${currentQuestion.no}】\n${currentQuestion.question}\n\n【正解】\n${currentQuestion.answer}\n\n【解説】\n${currentQuestion.explanation}\n\n背景や覚え方を詳しく教えて。`;
    if(memo) text += `\n\n【私のメモ】\n${memo}`;
    
    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(showToast);
    } else {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.focus(); textArea.select();
        try { document.execCommand('copy'); showToast(); } catch (err) {}
        document.body.removeChild(textArea);
    }
}

function showToast() {
    const toast = document.getElementById('copy-toast'); 
    toast.style.display = 'block'; 
    setTimeout(() => { toast.style.display = 'none'; }, 2000); 
}

function resetApp() { 
    const btn = document.getElementById('reset-btn'); 
    resetClickCount++; 
    if (resetClickCount === 1) { 
        btn.innerText = "この分野をリセットしますか？"; 
        btn.style.backgroundColor = "#ff5252"; 
        btn.style.color = "white";
        setTimeout(() => { resetClickCount = 0; btn.innerText = "この分野のデータをリセット"; btn.style.backgroundColor = "#ffcdd2"; btn.style.color = "#b71c1c"; }, 3000); 
    } else if (resetClickCount === 2) { 
        localStorage.removeItem(getKey('progress'));
        localStorage.removeItem(getKey('review'));
        localStorage.removeItem(getKey('fav'));
        localStorage.removeItem(getKey('memo'));
        localStorage.removeItem(getKey('lap')); // 周回数もリセット
        alert(`${currentField} のデータをリセットしました`);
        location.reload(); 
    } 
}

function showTestResult() { 
    document.getElementById('test-result-screen').style.display = 'flex'; 
    document.getElementById('test-score-text').innerText = `10問中 ${testCorrectCount}問 正解！`; 
}
</script>
